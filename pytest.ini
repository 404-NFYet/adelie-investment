[pytest]
asyncio_mode = auto
testpaths = tests tests/schemas tests/api
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: mark test as async
    slow: mark test as slow running
addopts =
    --cov=fastapi/app
    --cov=datapipeline
    --cov-report=html:coverage_html
    --cov-report=term-missing
    --cov-fail-under=0
    --no-cov-on-fail
