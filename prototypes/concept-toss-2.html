<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Concept D-2 - 투자 마스터 펭귄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#ff7648', bg: '#ffffff', text: '#101828', secondary: '#f2f4f6' } } }
        }
    </script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .device {
            width: 390px;
            height: 844px;
            background: #ffffff;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            border: 8px solid #111;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .device::-webkit-scrollbar {
            display: none;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes float-delayed {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* 펭귄 주위를 공전하는 아이콘들 */
        @keyframes orbit1 {
            0% {
                transform: rotate(0deg) translateX(90px) rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(180deg) translateX(90px) rotate(-180deg) scale(0.85);
            }

            100% {
                transform: rotate(360deg) translateX(90px) rotate(-360deg) scale(1);
            }
        }

        @keyframes orbit2 {
            0% {
                transform: rotate(120deg) translateX(85px) rotate(-120deg) scale(0.9);
            }

            50% {
                transform: rotate(300deg) translateX(85px) rotate(-300deg) scale(1.05);
            }

            100% {
                transform: rotate(480deg) translateX(85px) rotate(-480deg) scale(0.9);
            }
        }

        @keyframes orbit3 {
            0% {
                transform: rotate(240deg) translateX(95px) rotate(-240deg) scale(0.95);
            }

            50% {
                transform: rotate(420deg) translateX(95px) rotate(-420deg) scale(1.1);
            }

            100% {
                transform: rotate(600deg) translateX(95px) rotate(-600deg) scale(0.95);
            }
        }

        @keyframes gentle-bob {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-3px) rotate(2deg);
            }

            75% {
                transform: translateY(3px) rotate(-2deg);
            }
        }

        .orbit-icon-1 {
            animation: orbit1 12s linear infinite;
        }

        .orbit-icon-2 {
            animation: orbit2 15s linear infinite;
        }

        .orbit-icon-3 {
            animation: orbit3 18s linear infinite;
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float-delayed 5s ease-in-out infinite 1s;
        }

        .animate-bob {
            animation: gentle-bob 3s ease-in-out infinite;
        }

        *,
        *:focus,
        *:active {
            -webkit-tap-highlight-color: transparent;
        }

        .penguin-img {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.12));
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        .penguin-img:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 8px 20px rgba(255, 118, 72, 0.35));
        }

        .penguin-wrap {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
            -webkit-appearance: none;
            appearance: none;
            padding: 0;
            overflow: visible !important;
        }
    </style>
</head>

<body>
    <div class="device bg-[#f9fafb]">
        <!-- Header -->
        <header class="bg-white/90 backdrop-blur-md px-6 py-4 flex justify-between items-center z-20 shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-primary"></div>
                <h1 class="text-[17px] font-bold text-gray-500 tracking-wide">ADELIE AI</h1>
            </div>
            <button
                class="w-10 h-10 rounded-full border border-gray-100 flex items-center justify-center text-gray-600 relative bg-white shadow-sm">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </button>
        </header>

        <main class="flex-1 overflow-y-auto w-full pb-8">
            <!-- Hero Section: 펭귄 + 공전하는 3D 아이콘들 -->
            <section class="relative pt-10 pb-12 flex flex-col items-center justify-center">
                <div class="relative w-56 h-56 flex items-center justify-center mb-8">
                    <!-- Glow (부드러운 경계) -->
                    <div class="absolute inset-0 bg-[#fff0e6] rounded-full blur-3xl scale-125 opacity-60"></div>
                    <div class="absolute inset-4 bg-[#ffe4d6] rounded-full blur-2xl opacity-40"></div>

                    <!-- 공전하는 3D 아이콘들 -->
                    <div class="absolute inset-0 flex items-center justify-center">
                        <img src="./chart-dynamic-color.png" class="orbit-icon-1 absolute w-11 h-11" alt="chart" />
                        <img src="./rocket-dynamic-color.png" class="orbit-icon-2 absolute w-10 h-10" alt="rocket" />
                        <img src="./bulb-dynamic-color.png" class="orbit-icon-3 absolute w-9 h-9" alt="bulb" />
                    </div>

                    <!-- Penguin -->
                    <div id="penguin-btn"
                        class="penguin-wrap relative z-10 w-48 h-48 flex items-center justify-center cursor-pointer animate-bob">
                        <img id="penguin-img"
                            src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Penguin.png"
                            alt="Penguin" class="penguin-img w-36 h-36" />
                    </div>

                    <!-- Floating Badge: 내 자산 -->
                    <div
                        class="absolute -left-8 top-0 bg-white/95 backdrop-blur-md rounded-[16px] px-3.5 py-2 shadow-[0_4px_20px_rgb(0,0,0,0.08)] animate-float z-20 flex flex-col items-start border border-gray-50">
                        <p class="text-[11px] font-bold text-gray-400 mb-0.5">내 자산</p>
                        <div class="flex items-center gap-1">
                            <p class="text-[15px] font-extrabold text-gray-900 tracking-tight">1,245<span
                                    class="text-[13px] font-bold ml-[1px]">만원</span></p>
                            <span
                                class="text-[11px] font-bold text-red-500 bg-red-50/50 px-1 py-0.5 rounded leading-none">+3.2%</span>
                        </div>
                    </div>

                    <!-- Floating Badge: 연속 학습 -->
                    <div
                        class="absolute -right-6 bottom-4 bg-white/95 backdrop-blur-md rounded-[16px] px-3.5 py-2 shadow-[0_4px_20px_rgb(0,0,0,0.08)] animate-float-delayed z-20 flex flex-col items-center border border-gray-50">
                        <p class="text-[10px] font-bold text-gray-400 mb-0.5 items-end flex gap-1">
                            <span
                                class="w-3 h-3 bg-[#fff4ed] rounded-full text-[8px] flex items-center justify-center">🔥</span>연속
                            학습
                        </p>
                        <p class="text-[14px] font-extrabold text-gray-900 tracking-tight">7일째<span
                                class="text-[12px] ml-0.5">🔥</span></p>
                    </div>
                </div>

                <!-- Big Typography -->
                <div class="text-center px-6">
                    <h2 class="text-[28px] font-extrabold leading-[1.3] text-gray-900 tracking-tight break-keep">
                        <span class="text-primary">오늘의 브리핑</span>이<br />준비되었어요
                    </h2>
                    <p class="mt-3 text-[15px] font-medium text-gray-500 break-keep">
                        외국인 매도부터 하반기 전략까지, 3가지 주제
                    </p>
                </div>
            </section>

            <!-- Mission Loop -->
            <section class="px-5 pb-6">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-[19px] font-bold text-gray-900 tracking-tight">오늘의 핵심 미션</h3>
                    <span class="bg-gray-100 text-gray-500 text-[13px] font-bold px-3 py-1.5 rounded-full">3단계</span>
                </div>
                <div class="space-y-3">
                    <div
                        class="bg-white rounded-[24px] p-5 shadow-sm border border-gray-200 flex gap-4 items-center cursor-pointer hover:bg-gray-50 transition-colors active:scale-[0.98]">
                        <div
                            class="w-12 h-12 rounded-2xl bg-[#fff4ed] text-[#ff7648] flex items-center justify-center shrink-0 text-xl font-bold">
                            1</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span
                                    class="text-[11px] font-bold text-[#ff7648] bg-[#ff7648]/10 px-1.5 py-0.5 rounded">시작</span>
                                <span class="text-[12px] font-medium text-gray-400">3분 읽기</span>
                            </div>
                            <h4 class="text-[16px] font-bold text-gray-900 leading-[1.3] mb-1">오늘의 브리핑 읽기</h4>
                            <p class="text-[13px] text-gray-500">외국인 순매도와 금리 이슈 파악</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="m9 18 6-6-6-6"></path>
                            </svg>
                        </div>
                    </div>
                    <div
                        class="bg-white rounded-[24px] p-5 shadow-sm border border-gray-200 flex gap-4 items-center cursor-pointer hover:bg-gray-50 transition-colors active:scale-[0.98]">
                        <div
                            class="w-12 h-12 rounded-2xl bg-gray-100 text-gray-400 flex items-center justify-center shrink-0 text-xl font-bold">
                            2</div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span
                                    class="text-[11px] font-bold text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded">잠김</span>
                                <span class="text-[12px] font-medium text-gray-400">보상 대기</span>
                            </div>
                            <h4 class="text-[16px] font-bold text-gray-400 leading-[1.3] mb-1">오늘의 퀴즈 풀기</h4>
                            <p class="text-[13px] text-gray-400">배운 내용 복습하고 투자 지원금</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                    </div>
                    <div
                        class="bg-white rounded-[24px] p-5 shadow-sm border border-gray-200 flex gap-4 items-center cursor-pointer hover:bg-gray-50 transition-colors active:scale-[0.98]">
                        <div
                            class="w-12 h-12 rounded-2xl bg-gray-100 text-gray-400 flex items-center justify-center shrink-0 text-xl font-bold">
                            3</div>
                        <div class="flex-1">
                            <h4 class="text-[16px] font-bold text-gray-400 leading-[1.3] mb-1">배운 전략으로 모의투자</h4>
                            <p class="text-[13px] text-gray-400">오늘의 지식을 실행으로 옮겨요</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Nav -->
        <nav
            class="w-full bg-white border-t border-gray-100 py-2.5 pb-7 px-8 flex justify-between items-center z-30 shrink-0">
            <div
                class="flex flex-col items-center gap-1.5 text-gray-400 cursor-pointer hover:text-gray-900 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                </svg>
                <span class="text-[11px] font-bold">교육</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-900 cursor-pointer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                <span class="text-[11px] font-bold">홈</span>
            </div>
            <div
                class="flex flex-col items-center gap-1.5 text-gray-400 cursor-pointer hover:text-gray-900 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
                <span class="text-[11px] font-bold">투자</span>
            </div>
        </nav>
    </div>

    <script>
        const img = document.getElementById('penguin-img');
        document.getElementById('penguin-btn').addEventListener('click', () => {
            // 클릭 시 펭귄 점프 + 아이콘들 속도 증가 효과
            img.style.transform = 'translateY(-25px) scale(1.1) rotate(-5deg)';
            img.style.filter = 'drop-shadow(0 15px 20px rgba(255,118,72,0.6))';
            // 공전 아이콘 빠르게
            document.querySelectorAll('[class*="orbit-icon"]').forEach(el => {
                el.style.animationDuration = '2s';
            });
            setTimeout(() => {
                img.style.transform = '';
                img.style.filter = '';
                document.querySelectorAll('[class*="orbit-icon"]').forEach(el => {
                    el.style.animationDuration = '';
                });
            }, 600);
        });
    </script>
</body>

</html>
